name: PHPStan

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "**.php"
      - "phpstan.neon.dist"
      - ".github/actions/**"
      - ".github/workflows/phpstan.yml"
  pull_request:
    branches:
      - main
    paths:
      - "**.php"
      - "phpstan.neon"
      - ".github/actions/**"
      - ".github/workflows/phpstan.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-php

      - uses: ./.github/actions/setup-composer

      - uses: ./.github/actions/validate-composer

      - name: Run phpstan
        run: composer analyse
